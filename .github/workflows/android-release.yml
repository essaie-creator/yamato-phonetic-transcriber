name: Android Build and Release

on:
  push:
    tags:
      - "v*-android"
      - "v*-mobile"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x mobile-android/gradlew

    - name: Build Debug APK
      run: |
        cd mobile-android
        ./gradlew assembleDebug --no-daemon

    - name: Build Release APK (Unsigned)
      run: |
        cd mobile-android
        ./gradlew assembleRelease --no-daemon

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: yamato-debug-apk
        path: mobile-android/app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: yamato-release-unsigned-apk
        path: mobile-android/app/build/outputs/apk/release/app-release-unsigned.apk

    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          mobile-android/app/build/outputs/apk/debug/app-debug.apk
          mobile-android/app/build/outputs/apk/release/app-release-unsigned.apk
        generate_release_notes: true
        prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

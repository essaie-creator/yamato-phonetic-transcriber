name: Deploy Streamlit Web App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install streamlit phonemizer speechbrain onnxruntime
      
      - name: Create package
        run: |
          mkdir -p build
          cp app.py build/
          cp requirements-web.txt build/requirements.txt
          zip -r yamato-web-app.zip build/
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: yamato-web-app
          path: yamato-web-app.zip
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: yamato-web-app.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

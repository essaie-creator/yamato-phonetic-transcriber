name: Python Package Build and Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-python:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref, '-android') && !contains(github.ref, '-mobile') }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build setuptools wheel

    - name: Build package
      run: |
        python -m build

    - name: Upload distribution packages
      uses: actions/upload-artifact@v4
      with:
        name: python-dist
        path: dist/

    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: dist/*
        generate_release_notes: true
        prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-source-archive:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Create source archive
      run: |
        zip -r yamato-phonetic-transcriber-${{ github.ref_name }}.zip . \
          -x "*.git*" \
          -x "*.github/workflows/*" \
          -x "mobile-android/app/build/*" \
          -x "__pycache__/*" \
          -x "*.pyc"

    - name: Upload source archive
      uses: actions/upload-artifact@v4
      with:
        name: source-archive
        path: yamato-phonetic-transcriber-${{ github.ref_name }}.zip

    - name: Attach to Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: yamato-phonetic-transcriber-${{ github.ref_name }}.zip
        generate_release_notes: true
        prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
